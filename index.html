<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emre Elektrik & Pilsan Yetkili Servisi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: #0f172a; /* Animasyonlar yüklenirken karanlık şık arka plan */
        }

        .splash-container {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .splash-side {
            flex: 1;
            height: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            position: relative;
            padding: 30px;
            overflow: hidden;
            /* Esnek büyüme geçişi - Menüyü dinamik yapar */
            transition: flex-grow 0.6s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.5s ease;
        }

        /* --- SOL TARAF (ELEKTRİK - MAVİ) --- */
        .side-electric {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .side-electric::before, .side-electric::after {
            content: "";
            position: absolute;
            width: 65vw;
            height: 65vw;
            min-width: 450px;
            min-height: 450px;
            top: -15vw;
            left: -15vw;
            border-radius: 39%;
            border: 2px solid rgba(59, 130, 246, 0.15);
            background-color: transparent;
            pointer-events: none;
            animation: rotateWaves 20s linear infinite;
            transition: border-color 0.5s ease;
        }
        .side-electric::after {
            border-radius: 41%;
            border: 1.5px dashed rgba(30, 58, 138, 0.25);
            animation: rotateWaves 28s linear infinite;
        }

        .side-electric .icon-box {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .side-electric h1 {
            color: #f8fafc;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0);
            transition: all 0.4s ease;
        }

        /* --- SAĞ TARAF (AKÜLÜ ARABA - KIRMIZI) --- */
        .side-car {
            background: radial-gradient(circle at bottom right, #1e293b, #0f172a);
        }

        .side-car::before, .side-car::after {
            content: "";
            position: absolute;
            width: 65vw;
            height: 65vw;
            min-width: 450px;
            min-height: 450px;
            bottom: -15vw;
            right: -15vw;
            border-radius: 37%;
            border: 2px solid rgba(239, 68, 68, 0.15);
            background-color: transparent;
            pointer-events: none;
            animation: rotateWaves 22s linear infinite;
            transition: border-color 0.5s ease;
        }
        .side-car::after {
            border-radius: 43%;
            border: 1.5px dashed rgba(153, 27, 27, 0.25);
            animation: rotateWaves 32s linear infinite;
        }

        .side-car .icon-box {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .side-car h1 {
            color: #f8fafc;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0);
            transition: all 0.4s ease;
        }

        /* Kapsayıcı İkon Kutusu */
        .icon-box {
            width: 90px;
            height: 90px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float 4s ease-in-out infinite;
        }

        .side-car .icon-box { animation-delay: 2s; }

        /* Başlık Yapısı */
        .splash-side h1 {
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            z-index: 10;
        }

        .splash-side p {
            color: #94a3b8;
            font-size: 1rem;
            margin-top: 10px;
            max-width: 320px;
            position: relative;
            z-index: 10;
            opacity: 0.8;
            transition: color 0.4s;
        }

        /* --- MOUSE ÜZERİNE GELDİĞİNDE (HOVER EFFECT) --- */
        .splash-container:hover .splash-side {
            flex-grow: 0.75; /* Üzerine gelinmeyen taraf küçülür */
        }

        .splash-side:hover {
            flex-grow: 1.3 !important; /* Üzerine gelinen taraf genişler */
        }

        /* Elektrik Tarafı Hover */
        .side-electric:hover {
            background: radial-gradient(circle at top left, #1e3a8a, #0f172a);
        }
        .side-electric:hover .icon-box {
            transform: scale(1.15) rotate(10deg);
            background: #3b82f6;
            color: #ffffff;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.6);
        }
        .side-electric:hover h1 {
            color: #ffffff;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.8);
        }
        .side-electric:hover::before { border-color: rgba(59, 130, 246, 0.4); }
        .side-electric:hover p { color: #cbd5e1; }

        /* Araba Tarafı Hover */
        .side-car:hover {
            background: radial-gradient(circle at bottom right, #7f1d1d, #0f172a);
        }
        .side-car:hover .icon-box {
            transform: scale(1.15) rotate(-10deg);
            background: #ef4444;
            color: #ffffff;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.6);
        }
        .side-car:hover h1 {
            color: #ffffff;
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.8);
        }
        .side-car:hover::before { border-color: rgba(239, 68, 68, 0.4); }
        .side-car:hover p { color: #cbd5e1; }


        /* --- ANIMASYON TANIMLARI --- */
        @keyframes rotateWaves {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Sayfa İlk Açıldığında Aşağıdan Yukarı Süzülme Efekti */
        .animate-entrance {
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobil Görünüm Dengelemesi */
        @media (max-width: 768px) {
            .splash-container {
                flex-direction: column;
            }
            .splash-container:hover .splash-side,
            .splash-side:hover {
                flex-grow: 1 !important; /* Mobilde ekran bölünmesi sabit kalır */
            }
            .splash-side {
                width: 100%;
                height: 50vh;
            }
            .side-electric {
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }
            .splash-side h1 { font-size: 1.8rem; }
            .splash-side p { font-size: 0.9rem; max-width: 260px; }
            .icon-box { width: 70px; height: 70px; font-size: 2.2rem; margin-bottom: 10px; }
            
            .side-electric::before, .side-electric::after { width: 90vw; height: 90vw; top: -20vw; left: -10vw; }
            .side-car::before, .side-car::after { width: 90vw; height: 90vw; bottom: -20vw; right: -10vw; }
        }
    </style>
</head>
<body>

    <div class="splash-container">
        <a href="elektrik.html" class="splash-side side-electric">
            <div class="icon-box animate-entrance">⚡</div>
            <h1 class="animate-entrance delay-1">Emre Elektrik</h1>
            <p class="animate-entrance delay-2">Ev, İş Yeri Tesisat ve Endüstriyel Pano Çözümleri</p>
        </a>
        
        <a href="pilsan.html" class="splash-side side-car">
            <div class="icon-box animate-entrance">🏎️</div>
            <h1 class="animate-entrance delay-1">Akülü Araba Servisi</h1>
            <p class="animate-entrance delay-2">Pilsan Yetkili Fabrika Güvencesi ve Orijinal Yedek Parça</p>
        </a>
    </div>

</body>
</html>
