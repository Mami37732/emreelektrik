<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emre Elektrik & Pilsan Yetkili Servisi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100vh;
            overflow-x: hidden;
            overflow-y: hidden;
            background-color: #ffffff;
            position: relative;
        }

        .splash-container {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .splash-side {
            flex: 1;
            height: 100%;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            position: relative;
            transition: all 0.4s ease;
            padding: 20px;
            overflow: hidden;
        }

        /* --- SOL TARAF (ELEKTRİK - MAVİ ÇİZGİLER) --- */
        .side-electric {
            background-color: #ffffff;
            border-right: 1px solid #e2e8f0;
        }

        /* Bilgisayarda görünebilmesi için vw (ekran genişliği) cinsinden devasa boyut verdik */
        .side-electric::before, .side-electric::after {
            content: "";
            position: absolute;
            width: 70vw;
            height: 70vw;
            min-width: 400px;
            min-height: 400px;
            top: -20vw;
            left: -20vw;
            border-radius: 38%;
            border: 3px solid rgba(30, 58, 138, 0.12);
            background-color: transparent;
            pointer-events: none;
            animation: rotateWaves 15s linear infinite;
        }
        .side-electric::after {
            border-radius: 40%;
            border: 2px dashed rgba(59, 130, 246, 0.15);
            animation: rotateWaves 22s linear infinite;
        }

        .side-electric h1 {
            color: #1e3a8a;
            text-shadow: 0 2px 4px rgba(30, 58, 138, 0.1);
        }

        /* --- SAĞ TARAF (AKÜLÜ ARABA - KIRMIZI ÇİZGİLER) --- */
        .side-car {
            background-color: #ffffff;
        }

        .side-car::before, .side-car::after {
            content: "";
            position: absolute;
            width: 70vw;
            height: 70vw;
            min-width: 400px;
            min-height: 400px;
            bottom: -20vw;
            right: -20vw;
            border-radius: 35%;
            border: 3px solid rgba(153, 27, 27, 0.12);
            background-color: transparent;
            pointer-events: none;
            animation: rotateWaves 18s linear infinite;
        }
        .side-car::after {
            border-radius: 42%;
            border: 2px dashed rgba(239, 68, 68, 0.15);
            animation: rotateWaves 25s linear infinite;
        }

        .side-car h1 {
            color: #991b1b;
            text-shadow: 0 2px 4px rgba(153, 27, 27, 0.1);
        }

        .splash-side h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .splash-side:hover {
            background-color: #f8fafc;
        }
        
        .side-electric:hover h1 { transform: scale(1.05); color: #3b82f6; }
        .side-car:hover h1 { transform: scale(1.05); color: #ef4444; }

        @keyframes rotateWaves {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Mobil Görünüm */
        @media (max-width: 768px) {
            .splash-container { flex-direction: column; }
            .splash-side { width: 100%; height: 50vh; }
            .splash-side h1 { font-size: 1.8rem; }
            .side-electric { border-right: none; border-bottom: 1px solid #e2e8f0; }
            .side-electric::before, .side-electric::after { width: 100vw; height: 100vw; top: -30vw; left: -10vw; }
            .side-car::before, .side-car::after { width: 100vw; height: 100vw; bottom: -30vw; right: -10vw; }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <a href="elektrik.html" class="splash-side side-electric"><h1>⚡ EMRE ELEKTRİK</h1></a>
        <a href="pilsan.html" class="splash-side side-car"><h1>🏎️ AKÜLÜ ARABA SERVİSİ</h1></a>
    </div>
</body>
</html>
